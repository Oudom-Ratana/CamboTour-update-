<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CamboTour – Welcome</title>
<meta name="description" content="">

<meta property="og:url" content="https://cambotour.netlify.app/">
<meta property="og:type" content="website">
<meta property="og:title" content="CamboTour – Welcome">
<meta property="og:description" content="">
<meta property="og:image" content="./Cambotourthumbnail.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta property="twitter:domain" content="cambotour.netlify.app">
<meta property="twitter:url" content="https://cambotour.netlify.app/">
<meta name="twitter:title" content="CamboTour – Welcome">
<meta name="twitter:description" content="">
<meta name="twitter:image" content="./Cambotourthumbnail.jpg">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-white dark:bg-[#0a120e] min-h-screen flex flex-col items-center justify-center relative">

    <div id="loader" class="fixed inset-0 bg-white dark:bg-[#0a120e] flex items-center justify-center z-50 transition-opacity duration-700">
        <div class="w-12 h-12 border-4 border-[#D4AF37]/20 border-t-[#D4AF37] rounded-full animate-spin"></div>
    </div>

    <main id="mainContent" class="text-center px-6 opacity-0 transition-opacity duration-700">
        <div class="mb-8  animate-fadeInUp transition transform hover:-translate-y-3  hover:scale-105 shadow-md">
            <img class="mx-auto w-40 h-40 rounded-full" src="./CamboTour_logo.png" alt="">
        </div>

        <h1 class="text-4xl md:text-6xl font-bold text-gray-900 dark:text-white mb-4 animate-fadeInUp" style="animation-delay: 0.1s">
            Welcome to <span class="text-[#D4AF37]">CamboTour</span>
        </h1>

        <p class="text-lg md:text-xl text-gray-600 dark:text-gray-300 max-w-lg mx-auto animate-fadeInUp" style="animation-delay: 0.2s">
            "Discover the Kingdom of Wonder – where every journey becomes a story."
        </p>

        <div class="mt-12 animate-fadeInUp" style="animation-delay: 0.3s">
            <a href="./homepage.html" class="inline-block bg-[#D4AF37] hover:bg-[#c6a43b] text-gray-900 font-semibold px-8 py-3 rounded-full text-lg transition transform hover:scale-105 shadow-md">
                Enter the Experience →
            </a>
        </div>

    </main>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
    </style>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                const content = document.getElementById('mainContent');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 700);
                content.style.opacity = '1';
            }, 1200);
        });
    </script>
</body>
</html>
