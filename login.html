<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login/Register UI</title>
  <link rel="stylesheet" href="./src/output.css">
  <style>
    .hover\:bg-gray-200:hover {
      background-color: #e5e7eb;
    }
    .gap-x-3 {
      column-gap: 0.75rem;
    }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md">

    <div class="text-center mb-4">
      <h1 id="title" class="text-3xl font-bold">Welcome Back</h1>
      <p id="subtitle" class="text-gray-600">
        Sign in to continue your journey
      </p>
    </div>

    <div class="bg-gray-100 p-8 rounded-xl shadow-md">

      <div class="flex mb-6 border rounded-lg overflow-hidden">
        <button id="loginTab"
          class="flex-1 py-2 bg-orange-500 text-white font-semibold">
          Login
        </button>
        <button id="registerTab"
          class="flex-1 py-2 bg-gray-200 text-gray-500">
          Register
        </button>
      </div>

      <form id="loginForm" class="space-y-4">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
            <i class="fa-regular fa-envelope"></i>
          </span>
          <input type="email" id="loginEmail" placeholder="Email Address"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-400" />
        </div>

        <div class="relative"> 
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="loginPassword" 
              placeholder="Password"
              class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-400"/>
          </div>
          <button type="button"
            onclick="togglePassword('loginPassword')"
            class="absolute right-3 top-3">
            <svg id="loginEye" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
              class="w-6 h-6 text-gray-500">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 12s3.75-7.5 9.75-7.5S21.75 12 21.75 12s-3.75 7.5-9.75 7.5S2.25 12 2.25 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>

        <div class="text-right">
          <a href="#" class="text-orange-500 text-sm">
            Forgot Password?
          </a>
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-r from-orange-400 to-yellow-400 text-white py-3 rounded-lg">
          Sign In
        </button>

        <div class="flex items-center my-4">
          <hr class="flex-grow border-gray-300">
          <span class="mx-2 text-gray-400 text-sm">or continue with</span>
          <hr class="flex-grow border-gray-300">
        </div>

        <button type="button"
          class="w-full flex items-center justify-center border border-gray-300 rounded-lg py-2 hover:bg-gray-200 gap-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png" alt="" width="20px" height="20px" >
          Login with Google
        </button>
      </form>

      <form id="registerForm" class="space-y-4 hidden">
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
            <i class="fa-regular fa-user"></i>
          </span>
          <input type="text" id="regFullName" placeholder="Full Name"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-400" />
        </div>
        
        <div class="relative">
          <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
            <i class="fa-regular fa-envelope"></i>
          </span>
          <input type="email" id="regEmail" placeholder="Email Address"
          class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-400" />
        </div>
        
        <div class="relative">      
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="regPassword" 
              placeholder="Password"
              class="w-full pl-10 p-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-400"/>
          </div>
          <button type="button"
            onclick="togglePassword('regPassword')"
            class="absolute right-3 top-3">
            <svg id="regEye" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
              class="w-6 h-6 text-gray-500">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.25 12s3.75-7.5 9.75-7.5S21.75 12 21.75 12s-3.75 7.5-9.75 7.5S2.25 12 2.25 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
        
        <button type="submit"
          class="w-full bg-gradient-to-r from-orange-400 to-yellow-400 text-white py-3 rounded-lg">
          Create Account
        </button>
    
        <div class="flex items-center my-4">
          <hr class="flex-grow border-gray-300">
          <span class="mx-2 text-gray-400 text-sm">or continue with</span>
          <hr class="flex-grow border-gray-300">
        </div>
        
        <button type="button"
          class="w-full flex items-center justify-center border border-gray-300 rounded-lg py-2 hover:bg-gray-200 gap-x-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png" alt="" width="20px" height="20px" >
          Login with Google
        </button>
      </form>

    </div>
  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const title = document.getElementById('title');
    const subtitle = document.getElementById('subtitle');

    loginTab.onclick = () => {
      loginForm.classList.remove('hidden');
      registerForm.classList.add('hidden');
      title.innerText = "Welcome Back";
      subtitle.innerText = "Sign in to continue your journey";
      loginTab.classList.add('bg-orange-500','text-white');
      loginTab.classList.remove('bg-gray-200','text-gray-500');
      registerTab.classList.add('bg-gray-200','text-gray-500');
      registerTab.classList.remove('bg-orange-500','text-white');
    };

    registerTab.onclick = () => {
      loginForm.classList.add('hidden');
      registerForm.classList.remove('hidden');
      title.innerText = "Join Us";
      subtitle.innerText = "Create an account to start exploring";
      registerTab.classList.add('bg-orange-500','text-white');
      registerTab.classList.remove('bg-gray-200','text-gray-500');
      loginTab.classList.add('bg-gray-200','text-gray-500');
      loginTab.classList.remove('bg-orange-500','text-white');
    };

    function togglePassword(id) {
      const input = document.getElementById(id);
      if (input) {
        input.type = input.type === "password" ? "text" : "password";
      }
    }

    function handleLoginSuccess(event) {
      event.preventDefault();
      const emailInput = document.getElementById('loginEmail');
      const passwordInput = document.getElementById('loginPassword');
      const email = emailInput ? emailInput.value.trim() : '';
      const password = passwordInput ? passwordInput.value : '';
      if (email === '') {
        alert('Please enter your email address.');
        emailInput?.focus();
        return false;
      }
      if (password === '') {
        alert('Please enter your password.');
        passwordInput?.focus();
        return false;
      }
      if (!email.includes('@') || !email.includes('.')) {
        alert('Please enter a valid email address (e.g., name@example.com).');
        emailInput?.focus();
        return false;
      }
      alert('✅ Sign in successful! Redirecting to home page...');
      window.location.href = './index.html';
      return true;
    }
    
    function handleRegisterSuccess(event) {
      event.preventDefault();
      const fullNameInput = document.getElementById('regFullName');
      const emailInput = document.getElementById('regEmail');
      const passwordInput = document.getElementById('regPassword');
      const fullName = fullNameInput ? fullNameInput.value.trim() : '';
      const email = emailInput ? emailInput.value.trim() : '';
      const password = passwordInput ? passwordInput.value : '';
      if (fullName === '') {
        alert('Please enter your full name.');
        fullNameInput?.focus();
        return false;
      }
      if (email === '') {
        alert('Please enter your email address.');
        emailInput?.focus();
        return false;
      }
      if (password === '') {
        alert('Please choose a password.');
        passwordInput?.focus();
        return false;
      }
      if (!email.includes('@') || !email.includes('.')) {
        alert('Please enter a valid email address (e.g., name@example.com).');
        emailInput?.focus();
        return false;
      }
      if (password.length < 4) {
        alert('Password should be at least 4 characters for better security.');
        passwordInput?.focus();
        return false;
      }
      alert(`🎉 Welcome ${fullName}! Account created successfully. Redirecting to home page...`);
      window.location.href = './index.html';
      return true;
    }
    
    if (loginForm) {
      loginForm.addEventListener('submit', handleLoginSuccess);
    }
    if (registerForm) {
      registerForm.addEventListener('submit', handleRegisterSuccess);
    }
  </script>
</body>
</html>
